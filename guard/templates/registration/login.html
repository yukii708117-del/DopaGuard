{% extends "guard/base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="card">
    <h1>ログイン</h1>

    {% if form.errors %}
        <p class="error">ユーザー名またはパスワードが正しくありません。</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        {{ form.as_p }}

        <button class="btn" type="submit">ログイン</button>
        <a class="btn btn-secondary" href="{% url 'signup' %}">会員登録へ</a>
    </form>
</div>
{% endblock %}
