{% extends "guard/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="card">
    <h1>{{ page_title }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn" type="submit">{{ button_label }}</button>

        {% if item %}
            <a class="btn btn-secondary" href="{% url 'queue_detail' item.pk %}">戻る</a>
        {% else %}
            <a class="btn btn-secondary" href="{% url 'queue_list' %}">戻る</a>
        {% endif %}
    </form>
</div>
{% endblock %}
