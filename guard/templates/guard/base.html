<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}DopaGuard{% endblock %}</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #222;
        }

        header {
            background: #222;
            color: white;
            padding: 12px 24px;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-right: 16px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            margin: 4px 4px 4px 0;
            background: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .message {
            padding: 10px;
            background: #e7f3ff;
            border: 1px solid #9ec5fe;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }

        form.logout-form {
            display: inline;
        }
    </style>
</head>
<body>
<header>
    <div class="nav">
        <div>
            <a href="{% url 'home' %}"><strong>DopaGuard</strong></a>
        </div>

        <div>
            {% if user.is_authenticated %}
                <span>{{ user.username }} さん</span>
                <form class="logout-form" method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-secondary" type="submit">ログアウト</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">ログイン</a>
                <a href="{% url 'signup' %}">会員登録</a>
            {% endif %}
        </div>
    </div>
</header>

<main class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
